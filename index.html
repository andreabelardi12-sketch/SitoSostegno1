<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            color: #333; 
        }
        h1 { color: #2c3e50; font-size: 2.5em; margin-bottom: 10px; }
        p { color: #666; font-size: 1.2em; margin-bottom: 40px; }
        
        .menu { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            max-width: 400px; 
            margin: 0 auto; 
        }
        
        /* Stile dei bottoni del menu */
        a { 
            display: block;
            color: white; 
            padding: 20px; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 1.3em; 
            transition: 0.3s; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        a:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        
        /* Colori specifici per ogni strumento */
        .btn-semplifica { background: #8e44ad; } /* Viola */
        .btn-griglia { background: #f57c00; } /* Arancione */

</head>
